<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>后台管理 - Flight Base</title>
    <link rel="stylesheet" href="https://unpkg.com/layui@2.8.18/dist/css/layui.css">
    <link rel="stylesheet" href="assets/css/admin.css?v=3.3.0">
</head>
<body>
    <!-- 移动端侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- 头部 -->
    <div class="admin-header">
        <!-- 移动端汉堡按钮 -->
        <button class="menu-toggle-btn" id="menuToggleBtn" onclick="toggleSidebar()">
            <i class="layui-icon layui-icon-align-justify"></i>
        </button>
        <div class="logo">
        </div>
        <div class="user-info">
            <span class="username" id="username">管理员</span>
            <button class="layui-btn layui-btn-sm layui-btn-danger" onclick="logout()">
                <i class="layui-icon layui-icon-logout"></i> 退出
            </button>
        </div>
    </div>

    <!-- 侧边栏（动态生成） -->
    <div class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-logo">
            <i class="layui-icon layui-icon-engine"></i>
            <span id="sidebar-title">Flight Base</span>
        </div>
        <ul class="layui-nav layui-nav-tree" lay-filter="nav" id="nav-menu">
            <!-- 菜单将自动从后端加载 -->
        </ul>
    </div>

    <!-- 主内容区 -->
    <div class="admin-content">
        <!-- 仪表盘 -->
        <div id="dashboard-content">
            <!-- 统计卡片 -->
            <div class="stat-cards">
                <div class="stat-card">
                    <div class="icon blue">
                        <i class="layui-icon layui-icon-user"></i>
                    </div>
                    <div class="content">
                        <div class="title">用户总数</div>
                        <div class="value" id="stat-users">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="icon green">
                        <i class="layui-icon layui-icon-chart"></i>
                    </div>
                    <div class="content">
                        <div class="title">今日访问</div>
                        <div class="value" id="stat-visits">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="icon orange">
                        <i class="layui-icon layui-icon-file"></i>
                    </div>
                    <div class="content">
                        <div class="title">数据总量</div>
                        <div class="value" id="stat-data">0</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="icon purple">
                        <i class="layui-icon layui-icon-diamond"></i>
                    </div>
                    <div class="content">
                        <div class="title">系统状态</div>
                        <div class="value" style="font-size: 18px; color: #0dab61;">运行中</div>
                    </div>
                </div>
            </div>

            <!-- 欢迎卡片 -->
            <div class="card">
                <div class="card-title">
                    <i class="layui-icon layui-icon-tips"></i> 欢迎使用
                </div>
                <p>这是一个基于 <strong>Flight + Medoo + Layui</strong> 的轻量级后台管理系统框架。</p>
                <br>
                <p><strong>✨ 核心特性（配置驱动）：</strong></p>
                <ul style="padding-left: 20px; line-height: 2;">
                    <li>✅ <strong>零手写代码</strong>：后端配置 → 前端自动渲染</li>
                    <li>✅ <strong>AI 极度友好</strong>：配置即代码，AI 轻松生成</li>
                    <li>✅ <strong>超级轻量</strong>：核心代码不到 500 行</li>
                    <li>✅ <strong>无需打包</strong>：修改即生效，开发体验极致</li>
                </ul>
            </div>
        </div>

        <!-- 动态内容区（配置驱动自动渲染）-->
        <div id="dynamic-content" style="display: none;"></div>

        <!-- iframe 内容区（用于 CRUD 设计器等） -->
        <div id="iframe-content" style="display: none; height: calc(100vh - 80px); margin: -20px;">
            <iframe id="content-iframe" src="" frameborder="0" style="width: 100%; height: 100%;"></iframe>
        </div>
    </div>

    <!-- 状态模板 -->
    <script type="text/html" id="statusTpl">
        {{# if (d.status == 1) { }}
            <span class="layui-badge layui-bg-green">正常</span>
        {{# } else { }}
            <span class="layui-badge layui-bg-gray">禁用</span>
        {{# } }}
    </script>
    <!-- 状态模板 -->

    <script src="https://unpkg.com/layui@2.8.18/dist/layui.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- wangEditor 富文本编辑器 v5 -->
    <link href="https://unpkg.com/@wangeditor/editor@5.1.23/dist/css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/@wangeditor/editor@5.1.23/dist/index.js"></script>
    <script src="assets/js/config.js?v=2.3.7"></script>
    <script src="assets/js/common.js?v=2.3.7"></script>
    <script src="assets/js/crud-renderer.js?v=2.4.2"></script>
    <script>
        // 检查登录
        checkLogin();
        
        // 加载管理员信息
        loadAdminInfo();
        
        // 当前渲染器实例
        let currentRenderer = null;
        
        // 页面切换
        function showPage(pageName) {
            const dashboard = document.getElementById('dashboard-content');
            const dynamic = document.getElementById('dynamic-content');
            const iframeContent = document.getElementById('iframe-content');
            const iframe = document.getElementById('content-iframe');
            
            // 隐藏所有
            dashboard.style.display = 'none';
            dynamic.style.display = 'none';
            iframeContent.style.display = 'none';
            
            if (pageName === 'dashboard') {
                dashboard.style.display = 'block';
                loadStats();
            } else if (pageName === 'crud_designer') {
                // CRUD 设计器（加时间戳防止 iframe 缓存旧版本）
                iframeContent.style.display = 'block';
                iframe.src = 'crud-designer.html?v=' + Date.now();
            } else {
                dynamic.style.display = 'block';
                
                // 加载页面配置并渲染
                loadPageConfig(pageName);
            }
        }
        
        /**
         * 显示自定义视图页面（View 模式）
         * 通过 iframe 加载 /admin/view/{viewName}，由 PHP 控制器渲染
         */
        function showView(viewName) {
            const dashboard   = document.getElementById('dashboard-content');
            const dynamic     = document.getElementById('dynamic-content');
            const iframeContent = document.getElementById('iframe-content');
            const iframe      = document.getElementById('content-iframe');

            dashboard.style.display    = 'none';
            dynamic.style.display      = 'none';
            iframeContent.style.display = 'block';

            // 每次切换都重新加载，保证视图内容最新
            const viewUrl = '/admin/view/' + encodeURIComponent(viewName);
            if (iframe.src !== location.origin + viewUrl) {
                iframe.src = viewUrl;
            }
        }

        // 加载页面配置
        function loadPageConfig(pageName) {
            request(ADMIN_API_PREFIX + '/config?page=' + pageName, {
                method: 'GET'
            }).then(res => {
                if (res.code === 0) {
                    // 使用配置渲染页面
                    currentRenderer = renderCrudPage(res.data, 'dynamic-content');
                } else {
                    layer.msg('加载配置失败：' + res.msg, { icon: 2 });
                }
            });
        }
        
        // 加载系统配置
        function loadSystemConfig() {
            request(ADMIN_API_PREFIX + '/system', {
                method: 'GET'
            }).then(res => {
                if (res.code === 0) {
                    const adminName = res.data.admin_name || '管理后台';
                    //document.getElementById('admin-title').textContent = adminName;
                    document.title = adminName;
                    
                    // 更新侧边栏标题
                    const appName = res.data.name || 'Flight Base';
                    const sidebarTitle = document.getElementById('sidebar-title');
                    if (sidebarTitle) {
                        sidebarTitle.textContent = appName;
                    }
                    
                    console.log('系统名称已更新为：', adminName);
                }
            }).catch(err => {
                console.error('加载系统配置失败：', err);
            });
        }
        
        // 加载菜单配置
        function loadMenus() {
            request(ADMIN_API_PREFIX + '/menus', {
                method: 'GET'
            }).then(res => {
                if (res.code === 0) {
                    renderMenus(res.data);
                }
            });
        }
        
        // 渲染菜单
        function renderMenus(menus) {
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = '';
            
            let isFirstItem = true;
            let isFirstGroup = true;
            
            Object.keys(menus).forEach((groupName) => {
                let groupConfig = menus[groupName];
                let items = [];
                
                if (Array.isArray(groupConfig)) {
                    items = groupConfig;
                } else if (groupConfig.items) {
                    items = groupConfig.items;
                }
                
                if (items.length === 0) return;

                // 优先使用设计器配置的 expanded 字段；
                // 若未配置（旧数据），则第一个分组默认展开
                const shouldExpand = (typeof groupConfig.expanded !== 'undefined')
                    ? groupConfig.expanded
                    : isFirstGroup;
                isFirstGroup = false;
                
                const li = document.createElement('li');
                // data-expanded 记录配置意图，供 setTimeout 强制修正时使用（不受 Layui 自动行为干扰）
                li.dataset.expanded = shouldExpand ? 'true' : 'false';
                li.className = 'layui-nav-item' + (shouldExpand ? ' layui-nav-itemed' : '');
                
                let html = `<a href="javascript:;">${groupName}</a>`;
                html += `<dl class="layui-nav-child">`;
                
                items.forEach((item) => {
                    // layui-this 始终加在全局第一个菜单项（不管其分组是否展开）。
                    // Layui render('nav') 可能因此强制展开该分组，
                    // 但 setTimeout 会根据 data-expanded 将其强制还原。
                    const activeClass = isFirstItem ? 'layui-this' : '';
                    if (isFirstItem) isFirstItem = false;
                    
                    const icon = item.icon || 'layui-icon-file';
                    if (item.url) {
                        html += `<dd class="${activeClass}"><a href="${item.url}" target="_blank"><i class="layui-icon ${icon}"></i> ${item.name}</a></dd>`;
                    } else if (item.type === 'view') {
                        html += `<dd class="${activeClass}"><a href="javascript:;" data-view="${item.view}"><i class="layui-icon ${icon}"></i> ${item.name}</a></dd>`;
                    } else {
                        html += `<dd class="${activeClass}"><a href="javascript:;" data-page="${item.page}"><i class="layui-icon ${icon}"></i> ${item.name}</a></dd>`;
                    }
                });
                
                html += `</dl>`;
                li.innerHTML = html;
                navMenu.appendChild(li);
            });
            
            // 重新渲染 Layui 导航（Layui 接管展开/收起逻辑）
            layui.use('element', function(){
                var element = layui.element;
                element.render('nav');

                // Layui render('nav') 会自动展开含有 layui-this 子项的分组，
                // 这里以 data-expanded（配置意图）为最终权威，强制修正所有分组的展开/收起状态。
                setTimeout(function() {
                    navMenu.querySelectorAll('li.layui-nav-item').forEach(function(li) {
                        var child = li.querySelector('dl.layui-nav-child');
                        if (!child) return;
                        var shouldBeExpanded = li.dataset.expanded === 'true';
                        if (shouldBeExpanded) {
                            li.classList.add('layui-nav-itemed');
                            child.style.display = 'block';
                        } else {
                            // 移除 Layui 可能因 layui-this 子项而自动加上的 layui-nav-itemed
                            li.classList.remove('layui-nav-itemed');
                            child.style.display = 'none';
                        }
                    });
                }, 0);
                
                // 绑定普通 CRUD 页面点击事件
                navMenu.querySelectorAll('[data-page]').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const pageName = this.dataset.page;
                        
                        navMenu.querySelectorAll('.layui-nav-child dd').forEach(dd => dd.classList.remove('layui-this'));
                        this.closest('dd').classList.add('layui-this');
                        
                        showPage(pageName);
                    });
                });

                // 绑定自定义视图页面点击事件
                navMenu.querySelectorAll('[data-view]').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const viewName = this.dataset.view;
                        
                        navMenu.querySelectorAll('.layui-nav-child dd').forEach(dd => dd.classList.remove('layui-this'));
                        this.closest('dd').classList.add('layui-this');
                        
                        showView(viewName);
                    });
                });
            });
        }
        
        // 加载统计数据
        function loadStats() {
            // 用户总数
            request(ADMIN_API_PREFIX + '/stats/users', {
                method: 'GET'
            }).then(res => {
                if (res.code === 0) {
                    document.getElementById('stat-users').textContent = res.data.count || 0;
                }
            });
            
            // 访问总数（文章浏览量）
            request(ADMIN_API_PREFIX + '/stats/views', {
                method: 'GET'
            }).then(res => {
                if (res.code === 0) {
                    document.getElementById('stat-visits').textContent = res.data.count || 0;
                }
            });
            
            // 文章总数
            request(ADMIN_API_PREFIX + '/stats/articles', {
                method: 'GET'
            }).then(res => {
                if (res.code === 0) {
                    document.getElementById('stat-data').textContent = res.data.count || 0;
                }
            });
        }
        
        // 初始化
        loadSystemConfig();  // 加载系统配置
        loadMenus();         // 加载菜单
        loadStats();         // 加载统计数据

        // ── 移动端侧边栏控制 ──────────────────────────
        function toggleSidebar() {
            const sidebar = document.getElementById('adminSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.contains('sidebar-open');
            if (isOpen) {
                closeSidebar();
            } else {
                sidebar.classList.add('sidebar-open');
                overlay.classList.add('active');
                document.body.classList.add('sidebar-open-body');
            }
        }

        function closeSidebar() {
            const sidebar = document.getElementById('adminSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('sidebar-open');
            overlay.classList.remove('active');
            document.body.classList.remove('sidebar-open-body');
        }

        // 移动端菜单点击后自动关闭侧边栏（CRUD 页面和自定义视图均适用）
        document.addEventListener('click', function(e) {
            const link = e.target.closest('[data-page], [data-view]');
            if (link && window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    </script>
</body>
</html>
