<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>管理员登录 - Flight Base</title>
    <link rel="stylesheet" href="https://unpkg.com/layui@2.8.18/dist/css/layui.css">
    <link rel="stylesheet" href="assets/css/admin.css?v=3.0.0">
</head>
<body class="login-page">

<div class="login-wrap">
    <div class="login-logo">
        <div class="logo-icon">⚡</div>
        <h2>Flight Base</h2>
        <p>请使用管理员账号登录</p>
    </div>

    <div id="login-err"></div>

    <form class="layui-form" lay-filter="loginForm">
        <div class="layui-form-item">
            <div class="input-wrap">
                <i class="input-icon layui-icon layui-icon-username"></i>
                <input type="text" name="username" required lay-verify="required"
                       placeholder="请输入用户名" autocomplete="off" class="layui-input" value="admin">
            </div>
        </div>
        <div class="layui-form-item">
            <div class="input-wrap">
                <i class="input-icon layui-icon layui-icon-password"></i>
                <input type="password" name="password" required lay-verify="required"
                       placeholder="请输入密码" autocomplete="off" class="layui-input" value="password">
            </div>
        </div>
        <div class="layui-form-item">
            <div class="captcha-row">
                <input type="text" name="captcha" required lay-verify="required"
                       placeholder="请输入验证码" autocomplete="off" class="layui-input">
                <div class="captcha-img-box" title="点击刷新验证码">
                    <img src="/api/captcha" id="captchaImg">
                </div>
            </div>
        </div>
        <input type="hidden" name="type" value="admin">
        <div class="layui-form-item" style="margin-bottom: 0;">
            <button class="layui-btn login-btn" lay-submit lay-filter="login">立即登录</button>
        </div>
    </form>

    <div class="login-footer">
        Powered by Flight Base &copy; 2024
    </div>
</div>

<script src="https://unpkg.com/layui@2.8.18/dist/layui.js"></script>
<script src="assets/js/config.js?v=2.2.2"></script>
<script src="assets/js/common.js?v=2.2.2"></script>
<script>
    layui.use(['form', 'layer'], function(){
        const form = layui.form;
        const layer = layui.layer;

        // 如果已登录，跳转到主页
        if (getToken()) {
            request(ADMIN_API_PREFIX + '/info').then(res => {
                if (res.code === 0) {
                    location.href = 'index.html';
                }
            });
        }

        // 刷新验证码
        window.refreshCaptcha = function() {
            document.getElementById('captchaImg').src = '/api/captcha?t=' + new Date().getTime();
        };

        document.getElementById('captchaImg').onclick = refreshCaptcha;

        // 登录提交
        form.on('submit(login)', function(data){
            const $err = document.getElementById('login-err');
            $err.style.display = 'none';

            const loadIndex = loading();

            request(ADMIN_API_PREFIX + '/login', {
                method: 'POST',
                data: data.field
            }).then(res => {
                closeLoading(loadIndex);

                if (res.code === 0) {
                    setToken(res.data.token);

                    if (res.data.is_super_admin) {
                        localStorage.setItem('is_super_admin', '1');
                    } else {
                        localStorage.removeItem('is_super_admin');
                    }

                    if (res.data.permissions) {
                        localStorage.setItem('admin_permissions', JSON.stringify(res.data.permissions));
                    } else {
                        localStorage.removeItem('admin_permissions');
                    }

                    successMsg('登录成功', function(){
                        location.href = 'index.html';
                    });
                } else {
                    $err.textContent = res.msg || '账号或密码错误';
                    $err.style.display = 'block';
                    refreshCaptcha();
                }
            });

            return false;
        });
    });
</script>
</body>
</html>
